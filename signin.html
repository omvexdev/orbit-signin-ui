<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBIT | Sign In</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent-gold: #d4af37;
            --bg-dark: #050505;
            --glass: rgba(15, 15, 15, 0.95);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated Background Layer */
        #canvas-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.5;
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: var(--glass);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 28px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            opacity: 0; /* Animated by GSAP */
            transform: translateY(30px);
        }

        h1 {
             font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 10px;
            margin-bottom: 5px;
            background: linear-gradient(180deg, #fff 40%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            color: var(--accent-gold);
            font-weight: 700;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        /* Password Show/Hide Toggle */
        .toggle-pass {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-pass:hover {
            color: var(--accent-gold);
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-decoration: none;
            margin-top: -10px;
            margin-bottom: 30px;
        }

        .forgot-link:hover { color: var(--accent-gold); }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--accent-gold);
            background: transparent;
            color: var(--accent-gold);
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.4s;
        }

        .submit-btn:hover {
            background: var(--accent-gold);
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .footer a { color: #fff; text-decoration: none; font-weight: 600; border-bottom: 1px solid var(--accent-gold); padding-bottom: 2px; }
    </style>
</head>
<body>

    <div id="canvas-bg"></div>

    <div class="login-wrapper">
        <div class="login-card" id="card">
            <h1>ORBIT</h1>
            <p class="subtitle">Secure System Access</p>
            
            <form onsubmit="return false">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@company.com" required>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="login-pass" placeholder="••••••••" required>
                        <i class="fa-solid fa-eye toggle-pass" onclick="togglePass()"></i>
                    </div>
                </div>

                <a href="#" class="forgot-link">Forgot password?</a>

                <button type="submit" class="submit-btn" id="mag-btn">Enter System</button>
            </form>

            <p class="footer">Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- THREE.JS: CLASSY GOLD MESH ---
        const initScene = () => {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-bg').appendChild(renderer.domElement);

            const geometry = new THREE.PlaneGeometry(30, 30, 50, 50);
            const material = new THREE.MeshPhongMaterial({
                color: 0xd4af37,
                wireframe: true,
                transparent: true,
                opacity: 0.15
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.x = -Math.PI / 3;
            scene.add(mesh);

            const light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040, 2));

            camera.position.z = 8;

            function animate(time) {
                requestAnimationFrame(animate);
                const pos = geometry.attributes.position;
                for(let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i);
                    const y = pos.getY(i);
                    const z = Math.sin(x * 0.3 + time * 0.001) * Math.cos(y * 0.3 + time * 0.001) * 1.2;
                    pos.setZ(i, z);
                }
                pos.needsUpdate = true;
                mesh.rotation.z += 0.0005;
                renderer.render(scene, camera);
            }
            animate(0);
        };

        // Show/Hide Password Toggle
        function togglePass() {
            const passInput = document.getElementById('login-pass');
            const icon = document.querySelector('.toggle-pass');
            if (passInput.type === "password") {
                passInput.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // --- GSAP: ENTRANCE & MAGNETIC ---
        window.onload = () => {
            initScene();
            const card = document.getElementById('card');
            const btn = document.getElementById('mag-btn');

            gsap.to(card, { duration: 1.2, opacity: 1, y: 0, ease: "power4.out" });

            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX - window.innerWidth / 2) / 100;
                const y = (e.clientY - window.innerHeight / 2) / -100;
                gsap.to(card, { rotationY: x, rotationX: y, duration: 1.5 });

                const rect = btn.getBoundingClientRect();
                const bx = e.clientX - rect.left - rect.width/2;
                const by = e.clientY - rect.top - rect.height/2;
                if (Math.abs(bx) < 80 && Math.abs(by) < 80) {
                    gsap.to(btn, { x: bx * 0.3, y: by * 0.3, duration: 0.3 });
                } else {
                    gsap.to(btn, { x: 0, y: 0, duration: 0.3 });
                }
            });
        };
    </script>
</body>
</html>
