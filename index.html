<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBIT | Establish Uplink</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent-gold: #d4af37;
            --bg-obsidian: #050505;
            --glass-panel: rgba(12, 12, 12, 0.96);
            --text-silver: #e0e0e0;
            --text-muted: rgba(255, 255, 255, 0.4);
            --error: #ff4b2b;
            --success: #2ecc71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        body { 
            background: var(--bg-obsidian); 
            color: var(--text-silver); 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated Mesh Background */
        #canvas-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.6;
        }

        .signup-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .signup-card {
            background: var(--glass-panel);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 32px;
            padding: 45px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            opacity: 0;
            transform: translateY(30px);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 10px;
            margin-bottom: 5px;
            background: linear-gradient(180deg, #fff 40%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 35px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: var(--accent-gold);
            font-weight: 700;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 18px;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.07);
        }

        .toggle-pass {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Password Strength Bar */
        .strength-container {
            height: 3px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            margin-top: 8px;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .match-indicator {
            font-size: 10px;
            margin-top: 5px;
            height: 12px;
            font-weight: 600;
        }

         .submit-btn {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--accent-gold);
            background: transparent;
            color: var(--accent-gold);
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.4s;
        }

        .submit-btn:hover {
            background: var(--accent-gold);
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }

        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .footer a {
            color: #fff;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div id="canvas-bg"></div>

    <div class="signup-container">
        <div class="signup-card" id="main-panel">
            <h1>ORBIT</h1>
            <p class="subtitle">Secure System Access</p>
            
            <form onsubmit="return false">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="name">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@mail.global">
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="pass" placeholder="••••••••">
                        <i class="fa-solid fa-eye toggle-pass" onclick="view('pass', this)"></i>
                    </div>
                    <div class="strength-container"><div id="s-bar" class="strength-bar"></div></div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="c-pass" placeholder="••••••••">
                        <i class="fa-solid fa-eye toggle-pass" onclick="view('c-pass', this)"></i>
                    </div>
                    <div id="m-text" class="match-indicator"></div>
                </div>

                <button type="submit" class="submit-btn" id="mag-btn">Create Account</button>
            </form>

            <p class="footer">Already registered? <a href="#">Sign In</a></p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- THREE.JS BACKGROUND ---
        const initScene = () => {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-bg').appendChild(renderer.domElement);

            const geometry = new THREE.PlaneGeometry(35, 35, 50, 50);
            const material = new THREE.MeshPhongMaterial({ color: 0xd4af37, wireframe: true, transparent: true, opacity: 0.12 });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.x = -Math.PI / 2.5;
            scene.add(mesh, new THREE.PointLight(0xffffff, 1, 100), new THREE.AmbientLight(0x404040, 2));
            camera.position.z = 10;

            function animate(time) {
                requestAnimationFrame(animate);
                const pos = geometry.attributes.position;
                for(let i = 0; i < pos.count; i++) {
                    const z = Math.sin(pos.getX(i) * 0.3 + time * 0.001) * Math.cos(pos.getY(i) * 0.3 + time * 0.001) * 1.2;
                    pos.setZ(i, z);
                }
                pos.needsUpdate = true;
                renderer.render(scene, camera);
            }
            animate(0);
        };

        // --- PASSWORD UTILS ---
        function view(id, el) {
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
            el.classList.toggle("fa-eye-slash");
        }

        document.getElementById('pass').addEventListener('input', function() {
            let s = 0;
            if(this.value.length > 7) s += 40;
            if(/[A-Z]/.test(this.value)) s += 30;
            if(/[0-9!@#$%^&*]/.test(this.value)) s += 30;
            
            const bar = document.getElementById('s-bar');
            bar.style.width = s + "%";
            bar.style.background = s < 50 ? "#ff4b2b" : (s < 80 ? "#f1c40f" : "#2ecc71");
        });

        document.getElementById('c-pass').addEventListener('input', function() {
            const match = this.value === document.getElementById('pass').value;
            const mText = document.getElementById('m-text');
            mText.innerText = this.value === "" ? "" : (match ? "PASSWORDS MATCH" : "PASSWORDS DO NOT MATCH");
            mText.style.color = match ? "#2ecc71" : "#ff4b2b";
        });

        // --- GSAP REVEAL ---
        window.onload = () => {
            initScene();
            gsap.to("#main-panel", { duration: 1.5, opacity: 1, y: 0, ease: "power4.out" });
            
            document.addEventListener('mousemove', (e) => {
                const rx = (e.clientY - window.innerHeight / 2) / -100;
                const ry = (e.clientX - window.innerWidth / 2) / 100;
                gsap.to("#main-panel", { rotationX: rx, rotationY: ry, duration: 1.2 });
            });
        };
    </script>
</body>
</html>
